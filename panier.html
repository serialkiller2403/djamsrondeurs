<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panier - DJAM'S RONDEUR</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,"Times New Roman",serif;
}

body{
background:#fff;
}

header{
background:#000;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
height:80px;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

h1{
margin-bottom:30px;
}

.cart-item{
display:flex;
align-items:center;
gap:20px;
background:#fff;
border:1px solid #ddd;
border-radius:10px;
padding:15px;
margin-bottom:20px;
}

.cart-item img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}

.cart-info{
flex:1;
}

.cart-info h3{
margin-bottom:10px;
}

.qty{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.qty button{
width:35px;
height:35px;
border:none;
background:#0b7d35;
color:white;
font-size:18px;
cursor:pointer;
}

.remove{
background:#d60000;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
}

.summary{
margin-top:40px;
background:#f7f7f7;
padding:25px;
border-radius:10px;
}

.summary h2{
margin-bottom:15px;
}

.total{
font-size:26px;
font-weight:bold;
color:#0b7d35;
margin:15px 0;
}

.actions{
margin-top:20px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.actions a,
.actions button{
padding:15px 25px;
border:none;
text-decoration:none;
cursor:pointer;
border-radius:8px;
font-size:16px;
}

.pay{
background:#0b7d35;
color:white;
}

.clear{
background:#000;
color:white;
}

.empty{
text-align:center;
padding:50px;
font-size:22px;
color:#666;
}

footer{
margin-top:60px;
background:#000;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<img src="images/logo.jpg" class="logo">

<nav>

<a href="index.html">Accueil</a>
<a href="boutique.html">Boutique</a>
<a href="paiement.html">Paiement</a>

</nav>

</header>

<div class="container">

<h1>🛒 Mon Panier</h1>

<div id="cartContainer"></div>

<div id="summary" class="summary" style="display:none">

<h2>Récapitulatif</h2>

<p>Total en FCFA :</p>

<div class="total" id="totalFcfa"></div>

<p>Total en Euro :</p>

<div class="total" id="totalEuro"></div>

<div class="actions">

<a href="paiement.html" class="pay">
Passer ma commande
</a>

<button class="clear" onclick="clearCart()">
Vider le panier
</button>

</div>

</div>

</div>

<footer>

DJAM'S RONDEUR © 2025

</footer>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartContainer = document.getElementById("cartContainer");

const summary = document.getElementById("summary");

function renderCart(){

cartContainer.innerHTML="";

if(cart.length===0){

cartContainer.innerHTML=`
<div class="empty">
Votre panier est vide.
</div>
`;

summary.style.display="none";

return;

}

let total=0;

cart.forEach((item,index)=>{

let subtotal=item.price*item.quantity;

total+=subtotal;

cartContainer.innerHTML+=`

<div class="cart-item">

<img src="${item.image}" alt="">

<div class="cart-info">

<h3>${item.name}</h3>

<p>${item.price.toLocaleString()} FCFA</p>

<div class="qty">

<button onclick="decrease(${index})">-</button>

<span>${item.quantity}</span>

<button onclick="increase(${index})">+</button>

</div>

</div>

<button class="remove"
onclick="removeItem(${index})">

Supprimer

</button>

</div>

`;

});

summary.style.display="block";

document.getElementById("totalFcfa").innerText =
total.toLocaleString()+" FCFA";

document.getElementById("totalEuro").innerText =
(total/655.957).toFixed(2)+" €";

}

function increase(index){

cart[index].quantity++;

saveCart();

}

function decrease(index){

if(cart[index].quantity>1){

cart[index].quantity--;

saveCart();

}

}

function removeItem(index){

cart.splice(index,1);

saveCart();

}

function clearCart(){

if(confirm("Vider complètement le panier ?")){

cart=[];

saveCart();

}

}

function saveCart(){

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

}

renderCart();

</script>

</body>
</html>
