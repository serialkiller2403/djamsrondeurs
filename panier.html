<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Panier</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family:'Playfair Display', serif; margin:20px; }

table { width:100%; border-collapse:collapse; margin-top:20px;}
th, td { border:1px solid #ccc; padding:10px; text-align:center; }

button {
    padding:6px 10px;
    background:#2E7D32;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
button:hover {opacity:0.9;}

.quantity-btn { width:30px; height:30px; }

a {
    display:inline-block;
    margin-top:10px;
    text-decoration:none;
    font-weight:bold;
    color:#25D366;
}

/* 🔥 NOUVEAU FORMULAIRE LIVRAISON */
.delivery-box{
    margin-top:40px;
    padding:20px;
    border:1px solid #ddd;
    border-radius:10px;
    background:#f9f9f9;
    max-width:600px;
}

.delivery-box h2{
    color:#2E7D32;
}

.delivery-box input,
.delivery-box textarea,
.delivery-box select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-family:'Playfair Display', serif;
}
</style>
</head>

<body>

<header>
<h1>Votre Panier</h1>
</header>

<!-- PANIER -->
<table>
<thead>
<tr>
<th>Produit</th>
<th>Prix Unitaire</th>
<th>Quantité</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>
<tbody id="cart-items"></tbody>
</table>

<h2>Total général : <span id="grand-total"></span> FCFA</h2>

<h3>Paiements acceptés :</h3>
<ul>
<li>Wave</li>
<li>Orange Money</li>
<li>MTN Money</li>
<li>PayPal</li>
<li>Visa</li>
<li>Mastercard</li>
</ul>

<!-- 🔥 NOUVEAU MENU DÉROULANT LIVRAISON -->
<div class="delivery-box">

<h2>Coordonnées de livraison</h2>

<input type="text" id="fullname" placeholder="Nom complet" required>

<input type="tel" id="phone" placeholder="Numéro de téléphone" required>

<input type="email" id="email" placeholder="Adresse mail (optionnel)">

<textarea id="address" placeholder="Adresse de livraison (quartier, commune, ville)" required></textarea>

<select id="country">
<option value="">Choisir un pays</option>
<option>Côte d’Ivoire</option>
<option>Sénégal</option>
<option>Mali</option>
<option>Burkina Faso</option>
<option>Togo</option>
<option>Bénin</option>
<option>France</option>
<option>Canada</option>
</select>

<button onclick="checkout()">
Voir le récapitulatif
</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* AFFICHAGE PANIER */
function renderCart(){
    const tbody = document.getElementById("cart-items");
    tbody.innerHTML = "";
    let total = 0;

    cart.forEach((item,index)=>{
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        tbody.innerHTML += `
        <tr>
            <td>${item.name}</td>
            <td>${item.price} FCFA</td>
            <td>
                <button onclick="changeQty(${index},-1)">-</button>
                ${item.qty}
                <button onclick="changeQty(${index},1)">+</button>
            </td>
            <td>${itemTotal} FCFA</td>
            <td><button onclick="removeItem(${index})">Supprimer</button></td>
        </tr>`;
    });

    document.getElementById("grand-total").innerText = total;
}

/* QUANTITÉ */
function changeQty(index,delta){
    cart[index].qty += delta;
    if(cart[index].qty < 1) cart[index].qty = 1;
    localStorage.setItem("cart",JSON.stringify(cart));
    renderCart();
}

/* SUPPRIMER */
function removeItem(index){
    cart.splice(index,1);
    localStorage.setItem("cart",JSON.stringify(cart));
    renderCart();
}

/* 🔥 CHECKOUT + SAUVEGARDE LIVRAISON */
function checkout(){

    if(cart.length === 0){
        alert("Votre panier est vide !");
        return;
    }

    let deliveryInfo = {
        fullname: document.getElementById("fullname").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value,
        country: document.getElementById("country").value
    };

    if(
        deliveryInfo.fullname === "" ||
        deliveryInfo.phone === "" ||
        deliveryInfo.address === "" ||
        deliveryInfo.country === ""
    ){
        alert("Veuillez remplir les champs obligatoires !");
        return;
    }

    localStorage.setItem("deliveryInfo", JSON.stringify(deliveryInfo));

    window.location.href = "paiement.html";
}

renderCart();

</script>

</body>
</html>
