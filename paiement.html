<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paiement | DJAM'S RONDEUR</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,"Times New Roman",serif;
}

body{
background:#f8f8f8;
}

header{
background:#000;
color:#fff;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
height:80px;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

h1{
margin-bottom:30px;
text-align:center;
}

.checkout{
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
}

.form-box,
.summary-box{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:bold;
}

input,
textarea,
select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
}

textarea{
resize:none;
height:100px;
}

.payment-methods{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
margin-top:20px;
}

.payment-card{
border:2px solid #ddd;
border-radius:10px;
padding:15px;
cursor:pointer;
text-align:center;
transition:.3s;
}

.payment-card:hover{
border-color:#0b7d35;
}

.payment-card img{
width:80px;
height:auto;
margin-bottom:10px;
}

.total{
font-size:30px;
font-weight:bold;
color:#0b7d35;
margin:20px 0;
}

.submit-btn{
width:100%;
padding:18px;
background:#0b7d35;
color:white;
border:none;
font-size:18px;
cursor:pointer;
border-radius:10px;
margin-top:20px;
}

.submit-btn:hover{
background:#09662c;
}

.social{
margin-top:30px;
text-align:center;
}

.social a{
display:inline-block;
margin:10px;
padding:10px 20px;
background:black;
color:white;
text-decoration:none;
border-radius:8px;
}

footer{
background:black;
color:white;
text-align:center;
padding:20px;
margin-top:50px;
}

@media(max-width:900px){

.checkout{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>

<img src="images/logo.jpg" class="logo">

<nav>

<a href="index.html">Accueil</a>
<a href="boutique.html">Boutique</a>
<a href="panier.html">Panier</a>

</nav>

</header>

<div class="container">

<h1>Finaliser ma commande</h1>

<div class="checkout">

<!-- FORMULAIRE CLIENT -->

<div class="form-box">

<h2>Informations client</h2>

<form id="checkoutForm">

<label>Nom complet</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Téléphone WhatsApp</label>
<input type="tel" required>

<label>Pays</label>
<input type="text" required>

<label>Ville</label>
<input type="text" required>

<label>Adresse de livraison</label>
<textarea required></textarea>

<h2 style="margin-top:30px;">
Choisir un moyen de paiement
</h2>

<div class="payment-methods">

<label class="payment-card">
<input type="radio"
name="payment"
value="Wave"
required>
<br><br>
<img src="images/wave.png">
<p>Wave</p>
</label>

<label class="payment-card">
<input type="radio"
name="payment"
value="Orange Money">
<br><br>
<img src="images/orange-money.png">
<p>Orange Money</p>
</label>

<label class="payment-card">
<input type="radio"
name="payment"
value="PayPal">
<br><br>
<img src="images/paypal.png">
<p>PayPal</p>
</label>

<label class="payment-card">
<input type="radio"
name="payment"
value="Carte bancaire">
<br><br>
<img src="images/visa.png">
<img src="images/mastercard.png">
<p>Visa / Mastercard</p>
</label>

</div>

<button class="submit-btn" type="submit">

Valider ma commande

</button>

</form>

</div>

<!-- RESUME -->

<div class="summary-box">

<h2>Résumé de la commande</h2>

<hr><br>

<div id="cartSummary"></div>

<hr><br>

<p>Total à payer :</p>

<div class="total" id="totalAmount">

0 FCFA

</div>

<p id="totalEuro">

0 €

</p>

</div>

</div>

<div class="social">

<a href="https://www.instagram.com/chez_djams_rondeurs?igsh=MWdkdzN5eHBteWJkaQ%3D%3D&utm_source=qr">
Instagram
</a>

<a href="https://www.snapchat.com/@djamsrondeur?invite_id=shDwZX8k&locale=fr_CI&share_id=kVee4gkfSMeCa_ojhfm1Fg&sid=cd504d9aef8e463c962bdabfd6a8548e&locale=fr-CI">
Snapchat
</a>

</div>

</div>

<footer>

DJAM'S RONDEUR © 2025

</footer>

<script>

/* Lecture du panier */

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

let summary =
document.getElementById("cartSummary");

cart.forEach(item=>{

let subtotal =
item.price * item.quantity;

total += subtotal;

summary.innerHTML += `
<p>
${item.name}
x ${item.quantity}
<br>
<strong>
${subtotal.toLocaleString()} FCFA
</strong>
</p>
<br>
`;

});

document.getElementById(
"totalAmount"
).innerText =
total.toLocaleString()+" FCFA";

document.getElementById(
"totalEuro"
).innerText =
(total/655.957).toFixed(2)+" €";

/* Validation */

document
.getElementById("checkoutForm")
.addEventListener("submit",

function(e){

e.preventDefault();

alert(
"Merci pour votre commande chez DJAM'S RONDEUR.\n\nVotre demande a été enregistrée."
);

localStorage.removeItem("cart");

window.location.href="index.html";

});

</script>

</body>
</html>
