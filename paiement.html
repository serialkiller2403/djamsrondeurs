<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement - Boutique DJAM'S RONDEUR</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Playfair Display', serif;
    margin:0;
    background:#f5f5f5;
    color:#111;
}

/* HEADER */

header{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    margin:0;
    font-size:2rem;
}

/* CONTAINER */

.payment-container{
    max-width:1000px;
    margin:30px auto;
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* TITRES */

.section-title{
    color:#2E7D32;
    margin-bottom:20px;
    border-bottom:2px solid #2E7D32;
    padding-bottom:10px;
}

/* PRODUITS */

.product-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    padding:15px 0;
    border-bottom:1px solid #ddd;
}

.product-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.product-left img{
    width:90px;
    height:90px;
    object-fit:contain;
    border-radius:10px;
    border:1px solid #ddd;
    background:#fff;
}

.product-name{
    font-weight:bold;
    color:#2E7D32;
}

.product-price{
    font-size:15px;
}

/* LIVRAISON */

.delivery-info{
    margin-top:30px;
    background:#fafafa;
    padding:20px;
    border-radius:10px;
    border:1px solid #ddd;
}

.delivery-info p{
    margin:10px 0;
}

/* TOTAL */

.total-box{
    margin-top:30px;
    padding:20px;
    background:#2E7D32;
    color:white;
    border-radius:10px;
    text-align:center;
}

.total-box h2{
    margin:0;
}

/* PAIEMENT */

.payment-methods{
    margin-top:30px;
    text-align:center;
}

.payment-logos{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:20px;
}

.payment-logos img{
    width:80px;
    height:auto;
    object-fit:contain;
}

/* BOUTON */

button{
    width:100%;
    margin-top:30px;
    background:#111;
    color:white;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2E7D32;
}

/* RESPONSIVE */

@media(max-width:768px){

    .product-item{
        flex-direction:column;
        align-items:flex-start;
    }

    .payment-container{
        margin:15px;
        padding:20px;
    }

    .payment-logos img{
        width:60px;
    }

}

</style>

</head>

<body>

<header>
<h1>Paiement - Boutique DJAM'S RONDEUR</h1>
</header>

<div class="payment-container">

<!-- PRODUITS -->
<h2 class="section-title">Récapitulatif de votre commande</h2>

<div id="products"></div>

<!-- LIVRAISON -->
<div class="delivery-info">

<h2 class="section-title">Coordonnées de livraison</h2>

<p><strong>Nom complet :</strong> <span id="fullname"></span></p>

<p><strong>Téléphone :</strong> <span id="phone"></span></p>

<p><strong>Email :</strong> <span id="email"></span></p>

<p><strong>Adresse :</strong> <span id="address"></span></p>

<p><strong>Pays :</strong> <span id="country"></span></p>

</div>

<!-- TOTAL -->
<div class="total-box">

<h2>
Total Général :
<span id="grand-total"></span> FCFA
</h2>

<p>
≈ <span id="grand-euro"></span> €
</p>

</div>

<!-- MOYENS DE PAIEMENT -->

<div class="payment-methods">

<h2 class="section-title">
Moyens de paiement acceptés
</h2>

<div class="payment-logos">

<img src="images/wave.png" alt="Wave">

<img src="images/orange-money.png" alt="Orange Money">

<img src="images/mtn-money.png" alt="MTN Money">

<img src="images/paypal.png" alt="PayPal">

<img src="images/visa.png" alt="Visa">

<img src="images/mastercard.png" alt="Mastercard">

</div>

</div>

<!-- BOUTON -->
<button onclick="confirmPayment()">
Confirmer le paiement
</button>

</div>

<script>

/* RÉCUPÉRATION PANIER */

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

/* RÉCUPÉRATION LIVRAISON */

let deliveryInfo =
JSON.parse(localStorage.getItem("deliveryInfo")) || {};

/* PRODUITS */

let productsContainer =
document.getElementById("products");

let total = 0;

cart.forEach(item => {

    let itemTotal =
    item.price * item.qty;

    total += itemTotal;

    productsContainer.innerHTML += `

    <div class="product-item">

        <div class="product-left">

            <img src="images/${item.img}" alt="${item.name}">

            <div>

                <div class="product-name">
                ${item.name}
                </div>

                <div class="product-price">
                ${item.price} FCFA
                </div>

                <div>
                Quantité : ${item.qty}
                </div>

            </div>

        </div>

        <div>
            <strong>${itemTotal} FCFA</strong>
        </div>

    </div>

    `;
});

/* TOTAL */

document.getElementById("grand-total").innerText =
total.toLocaleString();

document.getElementById("grand-euro").innerText =
(total * 0.00152).toFixed(2);

/* INFOS LIVRAISON */

document.getElementById("fullname").innerText =
deliveryInfo.fullname || "-";

document.getElementById("phone").innerText =
deliveryInfo.phone || "-";

document.getElementById("email").innerText =
deliveryInfo.email || "-";

document.getElementById("address").innerText =
deliveryInfo.address || "-";

document.getElementById("country").innerText =
deliveryInfo.country || "-";

/* CONFIRMATION */

function confirmPayment(){

    if(cart.length === 0){

        alert("Votre panier est vide.");

        return;
    }

    alert(
        "Paiement confirmé ✅\n\n" +
        "Merci pour votre commande chez DJAM'S RONDEUR."
    );

    /* VIDER PANIER */

    localStorage.removeItem("cart");

    localStorage.removeItem("deliveryInfo");

    /* REDIRECTION */

    window.location.href = "index.html";
}

</script>

</body>
</html>
