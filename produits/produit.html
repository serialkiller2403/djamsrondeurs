<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produit - DJAM'S RONDEURS</title>

<link rel="stylesheet" href="../css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia, "Times New Roman", serif;
}

body{
background:#f5f5f5;
color:#111;
}

/* HEADER */

header{
background:#000;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
height:75px;
}

nav{
display:flex;
gap:20px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
}

/* PANIER */

.cart-link{
position:relative;
}

.cart-count{
position:absolute;
top:-10px;
right:-12px;
background:red;
color:white;
font-size:12px;
font-weight:bold;
width:22px;
height:22px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* PAGE PRODUIT */

.product-page{
max-width:1200px;
margin:50px auto;
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
align-items:center;
}

.product-image{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product-image img{
width:100%;
border-radius:15px;
object-fit:cover;
}

.product-details{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product-details h1{
font-size:40px;
margin-bottom:20px;
}

.price{
font-size:32px;
font-weight:bold;
color:#0b7d35;
margin-bottom:10px;
}

.price-euro{
font-size:18px;
color:#777;
margin-bottom:25px;
}

.description{
font-size:18px;
line-height:1.8;
margin-bottom:30px;
white-space:pre-line;
}

/* QUANTITE */

.quantity-box{
margin-bottom:30px;
}

.quantity-box h3{
font-size:22px;
margin-bottom:15px;
}

.quantity-controls{
display:flex;
align-items:center;
gap:15px;
}

.qty-btn{
width:50px;
height:50px;
border:none;
border-radius:10px;
background:#000;
color:white;
font-size:28px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.qty-btn:hover{
background:#0b7d35;
}

#quantity{
width:80px;
height:50px;
text-align:center;
font-size:22px;
font-weight:bold;
border:2px solid #ddd;
border-radius:10px;
outline:none;
}

/* BOUTONS */

.buttons{
display:flex;
flex-direction:column;
gap:15px;
}

.btn{
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
text-align:center;
transition:0.3s;
}

.btn-cart{
background:#0b7d35;
color:white;
}

.btn-cart:hover{
background:#086129;
}

.btn-payment{
background:#000;
color:white;
}

.btn-payment:hover{
background:#222;
}

.btn-whatsapp{
background:#25D366;
color:white;
}

.btn-whatsapp:hover{
transform:scale(1.03);
}

/* MESSAGE */

.message{
margin-top:20px;
padding:15px;
border-radius:10px;
background:#dfffe7;
color:#0b7d35;
font-weight:bold;
display:none;
}

/* FOOTER */

footer{
background:#000;
color:white;
text-align:center;
padding:20px;
margin-top:60px;
}

/* RESPONSIVE */

@media(max-width:900px){

.product-page{
grid-template-columns:1fr;
}

.product-details h1{
font-size:32px;
}

}

</style>

</head>

<body>

<header>

<img src="../images/logo.jpg" class="logo" alt="Logo">

<nav>

<a href="../index.html">Accueil</a>

<a href="../boutique.html">Boutique</a>

<a href="../panier.html" class="cart-link">
🛒 Panier
<span id="cart-count" class="cart-count">0</span>
</a>

<a href="../paiement.html">Paiement</a>

</nav>

</header>

<section class="product-page">

<div class="product-image">

<img 
id="productImage"
src="../images/produit1.jpg"
alt="Produit"
>

</div>

<div class="product-details">

<h1 id="productName">
Produit
</h1>

<div class="price" id="productPrice">
0 FCFA
</div>

<div class="price-euro" id="productEuro">
0 €
</div>

<p class="description" id="productDescription">
Description du produit
</p>

<div class="quantity-box">

<h3>Choisir la quantité</h3>

<div class="quantity-controls">

<button type="button" class="qty-btn" id="minusBtn">
-
</button>

<input
type="number"
id="quantity"
value="1"
min="1"
readonly
>

<button type="button" class="qty-btn" id="plusBtn">
+
</button>

</div>

</div>

<div class="buttons">

<button class="btn btn-cart" id="addToCartBtn">
🛒 Ajouter au panier
</button>

<a href="../panier.html" class="btn btn-payment">
🛒 Voir le panier
</a>

<a href="../paiement.html" class="btn btn-payment">
💳 Passer au paiement
</a>

<a
href="https://wa.me/message/SFC6Z5L7SCJPL1"
target="_blank"
class="btn btn-whatsapp"
>
📱 Contacter le support WhatsApp
</a>

</div>

<div class="message" id="message">
Produit ajouté au panier avec succès ✅
</div>

</div>

</section>

<footer>
DJAM'S RONDEURS © 2025
</footer>

<script>

/* ==============================

const products = {

},

},

},

},

13:{

name:"CURE MAA-BIO",

}

};

/* ==============================
   RECUPERATION ID
============================== */

const params =
new URLSearchParams(window.location.search);

const productId =
parseInt(params.get("id"));

if(!products[productId]){

window.location.href =
"../boutique.html";

}

const product =
products[productId];

/* ==============================
   AFFICHAGE PRODUIT
============================== */

document.getElementById("productName").innerText =
product.name;

document.getElementById("productPrice").innerText =
product.price.toLocaleString() + " FCFA";

document.getElementById("productEuro").innerText =
product.euro;

document.getElementById("productImage").src =
product.image;

document.getElementById("productDescription").innerText =
product.description;

/* ==============================
   QUANTITE
============================== */

const quantityInput =
document.getElementById("quantity");

document.getElementById("plusBtn").onclick =
function(){

quantityInput.value =
parseInt(quantityInput.value) + 1;

};

document.getElementById("minusBtn").onclick =
function(){

let qty =
parseInt(quantityInput.value);

if(qty > 1){

quantityInput.value =
qty - 1;

}

};

/* ==============================
   COMPTEUR PANIER
============================== */

function updateCartCounter(){

const counter =
document.getElementById("cart-count");

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(item=>{

total += item.quantity;

});

counter.innerText = total;

}

/* ==============================
   AJOUT PANIER
============================== */

document.getElementById(
"addToCartBtn"
).onclick = function(){

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let quantity =
parseInt(quantityInput.value);

const existingProduct =
cart.find(item =>
item.id === product.id
);

if(existingProduct){

existingProduct.quantity += quantity;

}else{

cart.push({

id:product.id,
name:product.name,
price:product.price,
image:product.image,
quantity:quantity

});

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCartCounter();

const message =
document.getElementById("message");

message.style.display = "block";

setTimeout(function(){

message.style.display = "none";

},3000);

};

/* INITIALISATION */

updateCartCounter();

</script>

</body>
</html>
